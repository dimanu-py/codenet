[project]
name = "codenet"
version = "0.1.0"
description = "A social network for programmers"


dependencies = [
    "fastapi[standard]>=0.115.6",
    "sqlalchemy>=2.0.36",
]

requires-python = "==3.13.*"
readme = "README.md"
license = {text = "MIT"}

[dependency-groups]
test = [
    "coverage>=7.6.9",
    "doublex>=1.9.6.1",
    "doublex-expects>=0.7.1",
    "expects>=0.9.0",
    "pytest>=8.3.4",
    "pytest-watch>=4.2.0",
    "pytest-xdist>=3.6.1",
]
lint = [
    "mypy>=1.13.0",
    "ruff>=0.8.3",
]
